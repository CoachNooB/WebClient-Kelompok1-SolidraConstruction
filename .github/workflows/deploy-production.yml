name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma:generate
      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm dlx vercel@50.1.6 pull --yes --environment=production --token="$VERCEL_TOKEN"
      - run: pnpm prisma:deploy
      - run: pnpm dlx vercel@50.1.6 build --prod --token="$VERCEL_TOKEN"
      - run: NODE_ENV=production pnpm dlx dotenv-cli@11.0.0 -e .vercel/.env.production.local -- pnpm verify:production
      - id: deploy
        run: |
          url="$(pnpm dlx vercel@50.1.6 deploy --prebuilt --prod --token="$VERCEL_TOKEN")"
          echo "url=$url" >> "$GITHUB_OUTPUT"
      - run: curl --fail --retry 5 --retry-delay 5 "${{ steps.deploy.outputs.url }}/api/health"
